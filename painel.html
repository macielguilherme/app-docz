<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Docz - Projetos Disponíveis</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Logo centralizada conforme imagem */
        .logo {
            width: 180px;
            height: auto;
            margin-top: 60px;
            margin-bottom: 45px;
        }

        /* Título da seção */
        h1 {
            font-size: 22px;
            color: #212121;
            margin-bottom: 35px;
            font-weight: 700;
        }

        /* Estrutura da Tabela */
        .table-container {
            width: 90%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: #f5f5f5;
            color: #333;
            font-size: 15px;
            padding: 15px 5px;
            border: 1px solid #e0e0e0;
            font-weight: 700;
        }

        td {
            border: 1px solid #e0e0e0;
            padding: 18px 5px;
            text-align: center;
            font-size: 14px;
            color: #666;
            vertical-align: middle;
        }

        /* Ícone de Check Verde oliva com sombra leve */
        .check-icon {
            width: 28px;
            height: 28px;
            fill: #8bc34a;
            filter: drop-shadow(1px 1px 1px rgba(0, 0, 0, 0.15));
        }

        /* Botão Azul de navegação */
        .btn-voltar {
            width: 90%;
            height: 55px;
            background-color: #4e85ba;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        /* Rodapé fixo ao fundo */
        .footer {
            margin-top: auto;
            width: 100%;
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid #eeeeee;
        }

        .footer p {
            font-size: 13px;
            color: #666;
            margin: 0;
        }
    </style>
</head>

<body>

    <img src="https://docz.sosdocs.com.br/Docz/app/images/logo.png" alt="Docz Logo" class="logo">

    <h1>Projetos Disponíveis</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 25%;">Código</th>
                    <th style="width: 50%;">Projeto</th>
                    <th style="width: 25%;">Ação</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>{codigo}</td>
                    <td>{projeto}</td>
                    <td>
                        <a href="opções.html"
                            style="display: flex; justify-content: center; align-items: center; text-decoration: none;">
                            <svg class="check-icon" viewBox="0 0 24 24">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                            </svg>
                        </a>
                    </td>
                </tr>
                <tr>
                    <td>{codigo}</td>
                    <td>{projeto}</td>
                    <td>
                        <a href="opções.html"
                            style="display: flex; justify-content: center; align-items: center; text-decoration: none;">
                            <svg class="check-icon" viewBox="0 0 24 24">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                            </svg>
                        </a>
                    </td>
                </tr>
                <tr>
                    <td>{codigo}</td>
                    <td>{projeto}</td>
                    <td>
                        <a href="opções.html"
                            style="display: flex; justify-content: center; align-items: center; text-decoration: none;">
                            <svg class="check-icon" viewBox="0 0 24 24">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                            </svg>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="index.html" class="btn-voltar">Voltar para Login</a>

    <div class="footer">
        <p>(c) Copyright {ano}. Todos os Direitos Reservados.</p>
    </div>

</body>

</html>
